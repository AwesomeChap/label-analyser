services:
  - type: web
    runtime: docker
    name: label-analyser-all-in-one
    envVars:
      - key: PORT
        value: "10000"
      - key: ANALYZE_PIPELINE
        value: yolo-obb
      - key: YOLO_OBB_WEIGHTS
        value: best.pt
      - key: YOLO_OBB_CONF
        value: "0.25"
      - key: GOOGLE_GEMINI_API_KEY
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_BUCKET_NAME
        sync: false
